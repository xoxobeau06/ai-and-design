<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Design Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .project-link {
            display: block;
            padding: 20px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .project-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .project-link .emoji {
            margin-right: 10px;
            font-size: 1.2em;
        }

        .project-description {
            display: block;
            font-size: 0.85em;
            margin-top: 5px;
            opacity: 0.9;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ AI & Design</h1>
        <p class="subtitle">Project Portfolio</p>
        
        <div class="projects">
            <a href="Link Site/dashboard/index.html" class="project-link">
                <span class="emoji">🔗</span>
                <span>Link Dashboard</span>
                <span class="project-description">Customizable link organizer with panels and categories</span>
            </a>
            
            <a href="MTG site /mtg-js-blueprint/index.html" class="project-link">
                <span class="emoji">🎴</span>
                <span>MTG Commander Site</span>
                <span class="project-description">Magic: The Gathering deck builder and tracker</span>
            </a>
            
            <a href="visual-system-starter-kit/index.html" class="project-link">
                <span class="emoji">🎨</span>
                <span>Visual System Starter Kit</span>
                <span class="project-description">Design system and component library</span>
            </a>
        </div>
    </div>
</body>
</html>
